name: Bug report
description: Report a reproducible SDK, CLI, documentation, or example problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys or provider credentials.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and observed behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: bottrade version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.4
    validations:
      required: true

