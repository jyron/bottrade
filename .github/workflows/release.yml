name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          python -c "import os,tomllib,pathlib;
          version=tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'];
          assert os.environ['RELEASE_TAG'] == 'v' + version,
          f\"tag {os.environ['RELEASE_TAG']} does not match package {version}\""
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bottrade
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
